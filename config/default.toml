# NIM CLI Default Configuration
# This file is auto-generated if it doesn't exist

[api]
# API key is read from NVIDIA_API_KEY environment variable by default
# api_key = "nvapi-xxx"

[model]
name = "meta/llama-3.1-8b-instruct"
temperature = 0.7
max_tokens = 4096
top_p = 1.0
stream = true

[network]
base_url = "https://integrate.api.nvidia.com/v1"
timeout = 60.0
connect_timeout = 10.0
max_retries = 3
retry_base_delay = 1.0
retry_max_delay = 60.0
connection_pool_size = 10

[display]
theme = "dark"
animation_speed = 1.0
show_token_count = true
show_timing = true
markdown_enabled = true
code_theme = "monokai"
max_line_width = 120
streaming_typing_speed = 0  # 0 = instant

[behavior]
auto_save_history = true
history_limit = 100
context_window = 128000
auto_compact = true

[logging]
level = "WARNING"
# file = "/path/to/logfile.log"
format = "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
include_timing = true
